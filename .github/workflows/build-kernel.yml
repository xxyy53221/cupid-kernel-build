name: Build Xiaomi 12 Latest KernelSU + SUSFS
on:
  workflow_dispatch:
    inputs:
      kernel_branch:
        description: 'Kernel branch (cupid-r-oss for Android 11 or cupid-q-oss for Android 10)'
        required: true
        default: 'cupid-r-oss'
        type: choice
        options:
          - cupid-r-oss
          - cupid-q-oss

jobs:
  build:
    name: Build Kernel for cupid
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 4096

      - name: Install Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y bc build-essential libelf-dev ccache flex bison libssl-dev git curl wget unzip zip gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libcrypto++-dev

      - name: Download Clang r450784d
        run: |
          mkdir -p $GITHUB_WORKSPACE/clang
          cd $GITHUB_WORKSPACE/clang
          echo "Downloading Android 13 Clang r450784d..."
          wget -O clang.tar.gz https://github.com/droidian/android-platform-prebuilts-clang-host-linux-x86-33/archive/refs/heads/master.tar.gz
          if [ $? -ne 0 ]; then
            echo "ERROR: Failed to download Clang from primary source"
            exit 1
          fi
          tar -xf clang.tar.gz --strip-components=1 || exit 1
          echo "Clang downloaded successfully"

      - name: Clone Xiaomi Kernel Source
        run: |
          echo "Cloning kernel branch: ${{ github.event.inputs.kernel_branch || 'cupid-r-oss' }}"
          git clone --depth=1 https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git -b "${{ github.event.inputs.kernel_branch || 'cupid-r-oss' }}" kernel-source || {
            echo "ERROR: Failed to clone kernel. Check if branch exists."
            exit 1
          }

      - name: Inject KernelSU
        run: |
          cd kernel-source
          echo "Cloning KernelSU..."
          git clone --depth=1 https://github.com/tiann/KernelSU.git ksu_src || exit 1
          
          cp -r ksu_src/kernel drivers/kernelsu || exit 1
          
          # Update Kconfig
          if ! grep -q "kernelsu" drivers/Kconfig; then
            sed -i '/^source/a source "drivers/kernelsu/Kconfig"' drivers/Kconfig
          fi
          
          # Update Makefile
          if ! grep -q "kernelsu" drivers/Makefile; then
            echo 'obj-y += kernelsu/' >> drivers/Makefile
          fi
          
          echo "KernelSU injected successfully"

      - name: Inject SUSFS
        run: |
          cd kernel-source
          echo "Cloning SUSFS4KSU..."
          git clone --depth=1 https://github.com/ShirkNeko/susfs4ksu.git $GITHUB_WORKSPACE/susfs_src || exit 1
          
          # Copy SUSFS files
          cp -af $GITHUB_WORKSPACE/susfs_src/fs/susfs.c fs/ || exit 1
          cp -af $GITHUB_WORKSPACE/susfs_src/include/linux/susfs.h include/linux/ || exit 1
          
          # Determine kernel version from branch
          if [[ "${{ github.event.inputs.kernel_branch || 'cupid-r-oss' }}" == *"r-oss" ]]; then
            PATCH_FILE="50_add_susfs_in_gki-android11-5.10.patch"
          else
            PATCH_FILE="50_add_susfs_in_gki-android10-4.19.patch"
          fi
          
          echo "Applying SUSFS patch: $PATCH_FILE"
          if [ -f "$GITHUB_WORKSPACE/susfs_src/kernel_patches/$PATCH_FILE" ]; then
            git apply "$GITHUB_WORKSPACE/susfs_src/kernel_patches/$PATCH_FILE" || {
              echo "WARNING: Patch failed, attempting manual merge..."
              git apply --reject "$GITHUB_WORKSPACE/susfs_src/kernel_patches/$PATCH_FILE" || true
            }
          else
            echo "WARNING: Patch file not found: $PATCH_FILE"
            echo "Available patches:"
            ls -la $GITHUB_WORKSPACE/susfs_src/kernel_patches/
          fi
          
          echo "SUSFS injected"

      - name: Compile Kernel
        run: |
          cd kernel-source
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          export ARCH=arm64
          export SUBARCH=arm64
          export HEADER_ARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          export CCACHE_COMPILERCHECK=content
          export CCACHE_MAXSIZE=50G
          
          echo "Generating defconfig..."
          make O=out cupid_defconfig || exit 1
          
          echo "Enabling KernelSU and SUSFS..."
          {
            echo "CONFIG_KSU=y"
            echo "CONFIG_KSU_DEBUG=y"
            echo "CONFIG_KSU_SUSFS=y"
          } >> out/.config
          
          echo "Building kernel..."
          make -j$(nproc) O=out \
            CC=clang \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip 2>&1 | tail -100
          
          if [ $? -ne 0 ]; then
            echo "ERROR: Kernel compilation failed"
            exit 1
          fi
          echo "Kernel compiled successfully"

      - name: Verify Kernel Image
        run: |
          cd kernel-source
          if [ -f "out/arch/arm64/boot/Image.gz-dtb" ]; then
            echo "Found: Image.gz-dtb"
            ls -lh out/arch/arm64/boot/Image.gz-dtb
          elif [ -f "out/arch/arm64/boot/Image.gz" ]; then
            echo "Found: Image.gz"
            ls -lh out/arch/arm64/boot/Image.gz
          elif [ -f "out/arch/arm64/boot/Image" ]; then
            echo "Found: Image"
            ls -lh out/arch/arm64/boot/Image
          else
            echo "ERROR: Kernel image not found!"
            echo "Contents of out/arch/arm64/boot/:"
            ls -la out/arch/arm64/boot/
            exit 1
          fi

      - name: Package AnyKernel3
        run: |
          echo "Cloning AnyKernel3..."
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3 || exit 1
          
          cd kernel-source
          # Copy kernel image (prioritize by likelihood)
          if [ -f "out/arch/arm64/boot/Image.gz-dtb" ]; then
            cp out/arch/arm64/boot/Image.gz-dtb ../AnyKernel3/Image.gz-dtb
            echo "Packaged: Image.gz-dtb"
          elif [ -f "out/arch/arm64/boot/Image.gz" ]; then
            cp out/arch/arm64/boot/Image.gz ../AnyKernel3/Image.gz
            echo "Packaged: Image.gz"
          elif [ -f "out/arch/arm64/boot/Image" ]; then
            cp out/arch/arm64/boot/Image ../AnyKernel3/Image
            echo "Packaged: Image"
          else
            echo "ERROR: No kernel image to package"
            exit 1
          fi
          
          cd ../AnyKernel3
          
          # Customize for Xiaomi 12 (cupid)
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
          sed -i 's/block=\/dev\/block\/platform\/omap\/omap_hsmmc.0\/by-name\/boot;/block=auto;/g' anykernel.sh
          sed -i 's/is_slot_device=0;/is_slot_device=1;/g' anykernel.sh
          
          # Create flashable ZIP
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          zip -r ../Xiaomi12-Cupid-KSU-SUSFS-${TIMESTAMP}.zip * -x "*.git*" "*.md" || exit 1
          
          echo "AnyKernel3 package created"
          ls -lh ../Xiaomi12-Cupid-KSU-SUSFS-*.zip

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Xiaomi12-Cupid-Kernel-${{ github.run_id }}
          path: Xiaomi12-Cupid-KSU-SUSFS-*.zip
          retention-days: 30

      - name: Build Summary
        if: always()
        run: |
          echo "=== Build Summary ==="
          echo "Workflow: ${{ github.workflow }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Kernel Branch: ${{ github.event.inputs.kernel_branch || 'cupid-r-oss' }}"
          echo "Status: ${{ job.status }}"
          echo "Timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
