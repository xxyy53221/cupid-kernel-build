name: Build Xiaomi 12 Latest KernelSU + SUSFS
on:
  workflow_dispatch:
    inputs:
      kernel_branch:
        description: 'Kernel branch'
        required: true
        default: 'gki'
        type: choice
        options:
          - gki

jobs:
  build:
    name: Build Kernel for cupid
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 4096

      - name: Install Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y bc build-essential libelf-dev ccache flex bison libssl-dev git curl wget unzip zip gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libcrypto++-dev

      - name: Download Clang r450784d
        run: |
          mkdir -p $GITHUB_WORKSPACE/clang
          cd $GITHUB_WORKSPACE/clang
          echo "Downloading Android 13 Clang r450784d..."
          wget -O clang.tar.gz https://github.com/droidian/android-platform-prebuilts-clang-host-linux-x86-33/archive/refs/heads/master.tar.gz
          if [ $? -ne 0 ]; then
            echo "ERROR: Failed to download Clang from primary source"
            exit 1
          fi
          tar -xf clang.tar.gz --strip-components=1 || exit 1
          echo "Clang downloaded successfully"

      - name: Clone Xiaomi Kernel Source
        run: |
          git clone --depth=1 https://github.com/WildKernels/GKI_KernelSU_SUSFS.git kernel-source || {
            echo "ERROR: Failed to clone kernel."
            exit 1
          }

      - name: Compile Kernel
        run: |
          cd kernel-source
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          export ARCH=arm64
          export SUBARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          
          echo "Generating GKI defconfig..."
          make O=out gki_defconfig || exit 1
          
          echo "Building kernel..."
          make -j$(nproc) O=out \
            CC=clang \
            CROSS_COMPILE=aarch64-linux-gnu- \
            LD=ld.lld

      - name: Verify Kernel Image
        run: |
          cd kernel-source
          ls -lah out/arch/arm64/boot/

      - name: Package AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          cd kernel-source
          cp out/arch/arm64/boot/Image.gz-dtb ../AnyKernel3/ 2>/dev/null || cp out/arch/arm64/boot/Image.gz ../AnyKernel3/
          cd ../AnyKernel3
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
          sed -i 's/is_slot_device=0;/is_slot_device=1;/g' anykernel.sh
          zip -r ../Xiaomi12-KSU-SUSFS.zip * -x "*.git*" "*.md"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Xiaomi12-KSU-SUSFS
          path: Xiaomi12-KSU-SUSFS.zip
