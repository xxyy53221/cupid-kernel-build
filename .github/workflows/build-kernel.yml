name: Build Xiaomi 12 Latest KernelSU + SUSFS (Optimized)
on:
  workflow_dispatch:
    inputs:
      auto_fix:
        description: 'Auto-fix build errors'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      use_cache:
        description: 'Use build cache'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  CLANG_DIR: ${{ github.workspace }}/clang
  KERNEL_DIR: ${{ github.workspace }}/kernel-source
  AK3_DIR: ${{ github.workspace }}/ak3
  BUILD_OUTPUT: Xiaomi12_Cupid_KSU_SUSFS_${{ github.run_number }}.zip
  ARCH: arm64
  LLVM: 1
  LLVM_IAS: 1

jobs:
  build:
    name: Build Kernel for cupid
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false

    steps:
      - name: 🎯 Checkout Repository
        uses: actions/checkout@v4

      - name: 📊 Display Build Information
        run: |
          echo "=========================================="
          echo "🔨 Xiaomi 12 Kernel Build System"
          echo "=========================================="
          echo "Build Number: ${{ github.run_number }}"
          echo "Date: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "OS: Ubuntu $(lsb_release -rs)"
          echo "CPU Cores: $(nproc)"
          echo "=========================================="

      - name: 💾 Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 4096
          swap-size-mb: 8192

      - name: 🔄 Setup Build Cache
        if: ${{ inputs.use_cache == 'true' }}
        uses: actions/cache@v4
        with:
          path: |
            ~/.ccache
            ${{ env.CLANG_DIR }}
          key: build-cache-${{ runner.os }}-${{ github.run_number }}
          restore-keys: build-cache-${{ runner.os }}-

      - name: 📦 Install Dependencies
        run: |
          echo "🔄 Installing build dependencies..."
          sudo apt-get update -y
          sudo apt-get install -y \
            bc build-essential libelf-dev ccache flex bison \
            libssl-dev git curl wget unzip zip \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            libcrypto++-dev libxml2-utils python3
          
          ccache --max-size=5G
          ccache --set-config=compression=true
          echo "✅ Dependencies installed"

      - name: ⬇️ Download Clang Compiler
        run: |
          echo "🔄 Checking Clang cache..."
          if [ -f "${{ env.CLANG_DIR }}/bin/clang" ]; then
            echo "✅ Clang found in cache"
            exit 0
          fi
          
          echo "📥 Downloading Android13 Clang r450784d..."
          mkdir -p ${{ env.CLANG_DIR }}
          cd ${{ env.CLANG_DIR }}
          
          wget -O clang.tar.gz https://github.com/droidian/android-platform-prebuilts-clang-host-linux-x86-33/archive/refs/heads/master.tar.gz \
            || { echo "❌ Clang download failed"; exit 1; }
          
          tar -xf clang.tar.gz --strip-components=1 \
            || { echo "❌ Clang extraction failed"; exit 1; }
          
          rm -f clang.tar.gz
          echo "✅ Clang ready"
          ls -la ${{ env.CLANG_DIR }}/bin/clang || { echo "❌ Clang binary not found"; exit 1; }

      - name: 🔧 Clone Cupid Official Kernel
        run: |
          echo "📥 Cloning kernel source..."
          git clone --depth=1 -b topaz \
            https://github.com/ZakoClubROM/android_kernel_xiaomi_cupid.git \
            ${{ env.KERNEL_DIR }} \
            || { echo "❌ Kernel clone failed"; exit 1; }
          echo "✅ Kernel source ready"

      - name: 💉 Inject KernelSU
        run: |
          echo "🔄 Injecting KernelSU..."
          cd ${{ env.KERNEL_DIR }}
          
          rm -rf ksu drivers/kernelsu
          
          git clone --depth=1 https://github.com/tiann/KernelSU.git ksu \
            || { echo "❌ KernelSU clone failed"; exit 1; }
          
          if [ ! -d "ksu/kernel" ]; then
            echo "❌ KernelSU kernel directory not found"
            exit 1
          fi
          
          cp -r ksu/kernel drivers/kernelsu || { echo "❌ KernelSU copy failed"; exit 1; }
          
          grep -q 'source "drivers/kernelsu/Kconfig"' drivers/Kconfig && \
            sed -i '/source "drivers\/kernelsu\/Kconfig"/d' drivers/Kconfig
          grep -q 'obj-y += kernelsu/' drivers/Makefile && \
            sed -i '/obj-y += kernelsu\//d' drivers/Makefile
          
          echo 'source "drivers/kernelsu/Kconfig"' >> drivers/Kconfig
          echo 'obj-y += kernelsu/' >> drivers/Makefile
          
          echo "✅ KernelSU injected"

      - name: 💉 Inject SUSFS
        continue-on-error: ${{ inputs.auto_fix == 'true' }}
        run: |
          echo "🔄 Injecting SUSFS..."
          cd ${{ env.KERNEL_DIR }}
          
          rm -rf susfs fs/susfs.c include/linux/susfs.h
          
          git clone --depth=1 https://github.com/ShirkNeko/susfs4ksu.git susfs \
            || { echo "⚠️  SUSFS clone failed"; exit 1; }
          
          if [ ! -f "susfs/fs/susfs.c" ] || [ ! -f "susfs/include/linux/susfs.h" ]; then
            echo "⚠️  SUSFS files not found, skipping"
            exit 0
          fi
          
          cp susfs/fs/susfs.c fs/ || echo "⚠️  SUSFS.c copy failed"
          cp susfs/include/linux/susfs.h include/linux/ || echo "⚠️  SUSFS header copy failed"
          
          if [ -f "susfs/kernel_patches/50_add_susfs_in_gki-android12-5.10.patch" ]; then
            git apply susfs/kernel_patches/50_add_susfs_in_gki-android12-5.10.patch || \
              echo "⚠️  SUSFS patch couldn't be fully applied"
          fi
          
          echo "✅ SUSFS injection completed"

      - name: ⚙️ Generate Kernel Config
        run: |
          echo "🔄 Generating kernel configuration..."
          cd ${{ env.KERNEL_DIR }}
          export PATH=${{ env.CLANG_DIR }}/bin:$PATH
          
          make O=out cupid_defconfig \
            || { echo "❌ Config generation failed"; exit 1; }
          
          grep -q '^CONFIG_KSU=y' out/.config && sed -i '/^CONFIG_KSU=/d' out/.config
          grep -q '^CONFIG_KSU_SUSFS=y' out/.config && sed -i '/^CONFIG_KSU_SUSFS=/d' out/.config
          
          echo 'CONFIG_KSU=y' >> out/.config
          echo 'CONFIG_KSU_SUSFS=y' >> out/.config
          
          if grep -q 'CONFIG_KSU=y' out/.config; then
            echo "✅ KernelSU config added"
          else
            echo "❌ KernelSU config verification failed"
            exit 1
          fi

      - name: 🔨 Compile Cupid Kernel
        run: |
          echo "🔄 Starting kernel compilation..."
          cd ${{ env.KERNEL_DIR }}
          export PATH=${{ env.CLANG_DIR }}/bin:$PATH
          export CROSS_COMPILE=aarch64-linux-gnu-
          export LD=ld.lld
          export CC=clang
          
          JOBS=$(($(nproc) + 1))
          echo "📊 Using $JOBS parallel jobs"
          
          START_TIME=$(date +%s)
          make -j$JOBS O=out \
            CC=$CC \
            CROSS_COMPILE=$CROSS_COMPILE \
            LD=$LD \
            2>&1 | tee build.log \
            || { echo "❌ Kernel compilation failed"; tail -100 build.log; exit 1; }
          END_TIME=$(date +%s)
          
          BUILD_TIME=$((END_TIME - START_TIME))
          echo "✅ Compilation completed in $((BUILD_TIME / 60))m $((BUILD_TIME % 60))s"
          
          if [ -f "out/arch/arm64/boot/Image.gz-dtb" ]; then
            SIZE=$(stat -c%s "out/arch/arm64/boot/Image.gz-dtb")
            echo "📦 Kernel image size: $((SIZE / 1024 / 1024))MB"
          else
            echo "❌ Kernel image not found!"
            exit 1
          fi

      - name: 📦 Package Flashable ZIP
        run: |
          echo "🔄 Packaging flashable ZIP..."
          
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git ${{ env.AK3_DIR }} \
            || { echo "❌ AnyKernel3 clone failed"; exit 1; }
          
          if [ ! -f "${{ env.KERNEL_DIR }}/out/arch/arm64/boot/Image.gz-dtb" ]; then
            echo "❌ Kernel image not found!"
            exit 1
          fi
          
          cp ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/Image.gz-dtb ${{ env.AK3_DIR }}/ \
            || { echo "❌ Kernel copy failed"; exit 1; }
          
          cd ${{ env.AK3_DIR }}
          
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
          sed -i 's/is_slot_device=0;/is_slot_device=1;/g' anykernel.sh
          
          if grep -q "do.devicecheck=0" anykernel.sh && grep -q "is_slot_device=1" anykernel.sh; then
            echo "✅ AnyKernel3 configuration updated"
          else
            echo "❌ AnyKernel3 configuration failed"
            exit 1
          fi
          
          zip -r -0 ../${{ env.BUILD_OUTPUT }} * \
            -x "*.git*" ".gitignore" \
            || { echo "❌ ZIP creation failed"; exit 1; }
          
          if [ -f "../${{ env.BUILD_OUTPUT }}" ]; then
            ZIP_SIZE=$(stat -c%s "../${{ env.BUILD_OUTPUT }}")
            echo "✅ ZIP created: ${{ env.BUILD_OUTPUT }} ($((ZIP_SIZE / 1024 / 1024))MB)"
          else
            echo "❌ ZIP file not found!"
            exit 1
          fi

      - name: 📊 Generate Checksums
        run: |
          echo "🔄 Generating checksums..."
          cd ${{ github.workspace }}
          
          if [ -f "${{ env.BUILD_OUTPUT }}" ]; then
            sha256sum ${{ env.BUILD_OUTPUT }} > ${{ env.BUILD_OUTPUT }}.sha256
            md5sum ${{ env.BUILD_OUTPUT }} > ${{ env.BUILD_OUTPUT }}.md5
            
            echo "📋 Build Checksums:"
            cat ${{ env.BUILD_OUTPUT }}.sha256
            cat ${{ env.BUILD_OUTPUT }}.md5
          else
            echo "❌ Build output not found!"
            exit 1
          fi

      - name: 📤 Upload Kernel ZIP
        uses: actions/upload-artifact@v4
        with:
          name: Xiaomi12-Cupid-Kernel-${{ github.run_number }}
          path: |
            ${{ env.BUILD_OUTPUT }}
            ${{ env.BUILD_OUTPUT }}.sha256
            ${{ env.BUILD_OUTPUT }}.md5
            ${{ env.KERNEL_DIR }}/build.log
          retention-days: 30
          if-no-files-found: error

      - name: ✅ Build Summary
        if: always()
        run: |
          echo "=========================================="
          echo "✅ Build Pipeline Completed"
          echo "=========================================="
          echo "Build Number: ${{ github.run_number }}"
          echo "Status: ${{ job.status }}"
          echo "Output: ${{ env.BUILD_OUTPUT }}"
          echo "Time: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "=========================================="
          
          if [ -f "${{ env.BUILD_OUTPUT }}" ]; then
            echo "📦 Final Package: $(stat -c%s ${{ env.BUILD_OUTPUT }}) bytes"
          fi
