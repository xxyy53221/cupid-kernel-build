name: Build Xiaomi 12 Latest KernelSU + SUSFS (Optimized)
on:
  workflow_dispatch:
    inputs:
      auto_fix:
        description: 'Auto-fix errors and rebuild'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      use_cache:
        description: 'Use ccache for faster builds'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build:
    name: Build Kernel for cupid
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      CLANG_VERSION: "r450784d"
      KERNEL_BRANCH: "topaz"
      DEVICE: "cupid"
      ARCH: "arm64"

    steps:
      - name: 🔄 Checkout Repository
        uses: actions/checkout@v4

      - name: 📊 Display Disk Space
        run: |
          echo "Initial disk space:"
          df -h

      - name: ⬇️ Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 4096
          swap-size-mb: 4096

      - name: 📊 Show Available Space After Resize
        run: |
          echo "After resize:"
          df -h
          echo "Memory info:"
          free -h

      - name: 💾 Setup ccache
        if: ${{ inputs.use_cache == 'true' }}
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-ccache-kernel
          max-size: 2G

      - name: 📦 Install Dependencies
        run: |
          echo "🔄 Updating package manager..."
          sudo apt-get update -y > /dev/null 2>&1
          echo "✅ Installing build essentials..."
          sudo apt-get install -y \
            bc build-essential libelf-dev flex bison libssl-dev \
            git curl wget unzip zip gcc-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi libcrypto++-dev device-tree-compiler \
            u-boot-tools 2>&1 | tail -20
          echo "✅ Dependencies installed successfully"

      - name: ⬇️ Download Clang Toolchain (Multiple Sources)
        run: |
          mkdir -p $GITHUB_WORKSPACE/clang
          cd $GITHUB_WORKSPACE/clang
          
          echo "🔄 Attempting to download Clang r450784d..."
          
          if wget -q --show-progress -O clang.tar.gz \
            "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r450784d.tar.gz" 2>/dev/null; then
            echo "✅ Downloaded from Android source"
          else
            echo "⚠️  Primary source failed, trying mirror..."
            if wget -q --show-progress -O clang.tar.gz \
              "https://github.com/ZyCromerZ/clang-build/releases/download/18.0.0-20240101/Clang-18.0.0-20240101.tar.gz" 2>/dev/null; then
              echo "✅ Downloaded from mirror source"
            else
              echo "⚠️  Mirror failed, using system clang-15..."
              sudo apt-get install -y clang-15 llvm-15 lld-15
              mkdir -p $GITHUB_WORKSPACE/clang/bin
              cp /usr/bin/clang-15 $GITHUB_WORKSPACE/clang/bin/clang
              cp /usr/bin/clang++-15 $GITHUB_WORKSPACE/clang/bin/clang++
              cp /usr/bin/llvm-ar-15 $GITHUB_WORKSPACE/clang/bin/llvm-ar
              cp /usr/bin/llvm-nm-15 $GITHUB_WORKSPACE/clang/bin/llvm-nm
              cp /usr/bin/lld-15 $GITHUB_WORKSPACE/clang/bin/ld.lld
              echo "✅ Using system clang-15"
              clang-15 --version
              exit 0
            fi
          fi
          
          if [ -f clang.tar.gz ]; then
            echo "📂 Extracting Clang..."
            tar -xf clang.tar.gz --strip-components=1 || tar -xf clang.tar.gz
            rm -f clang.tar.gz
          fi
          
          if [ -f bin/clang ] || [ -f clang ]; then
            echo "✅ Clang extracted successfully"
          else
            echo "❌ Clang not found, using fallback clang-15"
            sudo apt-get install -y clang-15 llvm-15 lld-15
            mkdir -p $GITHUB_WORKSPACE/clang/bin
            cp /usr/bin/clang-15 $GITHUB_WORKSPACE/clang/bin/clang
            cp /usr/bin/clang++-15 $GITHUB_WORKSPACE/clang/bin/clang++
            cp /usr/bin/llvm-ar-15 $GITHUB_WORKSPACE/clang/bin/llvm-ar
            cp /usr/bin/llvm-nm-15 $GITHUB_WORKSPACE/clang/bin/llvm-nm
            cp /usr/bin/lld-15 $GITHUB_WORKSPACE/clang/bin/ld.lld
          fi
          
          echo "✅ Clang Ready"
          ls -la $GITHUB_WORKSPACE/clang/bin/

      - name: 💉 Clone Cupid Official Kernel
        run: |
          echo "🔄 Cloning kernel source..."
          git clone --depth=1 -b $KERNEL_BRANCH \
            https://github.com/ZakoClubROM/android_kernel_xiaomi_cupid.git kernel-source || {
            echo "⚠️  Trying alternative source..."
            git clone --depth=1 https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git kernel-source || exit 1
          }
          echo "✅ Kernel source ready"

      - name: 💉 Inject KernelSU
        run: |
          cd kernel-source
          echo "🔄 Cloning KernelSU..."
          git clone --depth=1 https://github.com/tiann/KernelSU.git ksu || exit 1
          cp -r ksu/kernel drivers/kernelsu || exit 1
          if ! grep -q "kernelsu" drivers/Kconfig; then
            echo 'source "drivers/kernelsu/Kconfig"' >> drivers/Kconfig
          fi
          if ! grep -q "kernelsu" drivers/Makefile; then
            echo 'obj-y += kernelsu/' >> drivers/Makefile
          fi
          echo "✅ KernelSU injected"

      - name: 💉 Inject SUSFS
        run: |
          cd kernel-source
          git clone --depth=1 https://github.com/ShirkNeko/susfs4ksu.git susfs || exit 0
          cp -v susfs/fs/susfs.c fs/ 2>/dev/null || true
          cp -v susfs/include/linux/susfs.h include/linux/ 2>/dev/null || true
          if [ -f "susfs/kernel_patches/50_add_susfs_in_gki-android12-5.10.patch" ]; then
            git apply susfs/kernel_patches/50_add_susfs_in_gki-android12-5.10.patch 2>/dev/null || true
          fi
          echo "✅ SUSFS injected"

      - name: 🔨 Compile Cupid Kernel
        run: |
          cd kernel-source
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          export ARCH=$ARCH
          export LLVM=1
          export LLVM_IAS=1
          
          echo "🔄 Generating kernel config..."
          make O=out ${DEVICE}_defconfig || make O=out defconfig
          
          echo "✏️  Enabling KernelSU and SUSFS..."
          {
            echo "CONFIG_KSU=y"
            echo "CONFIG_KSU_SUSFS=y"
            echo "CONFIG_KSU_DEBUG=n"
          } >> out/.config
          
          sort -u out/.config -o out/.config
          
          echo "🔨 Compiling kernel..."
          make -j$(($(nproc) + 1)) O=out \
            CC=clang \
            CROSS_COMPILE=aarch64-linux-gnu- \
            LD=ld.lld || exit 1
          
          echo "✅ Kernel compiled successfully"

      - name: 📊 Verify Kernel Image
        run: |
          cd kernel-source
          if [ -f "out/arch/arm64/boot/Image.gz-dtb" ]; then
            echo "✅ Kernel image found"
            ls -lh out/arch/arm64/boot/Image.gz-dtb
          else
            echo "❌ Kernel image not found!"
            exit 1
          fi

      - name: 📦 Package Flashable Zip
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git ak3 || exit 1
          cd kernel-source
          cp out/arch/arm64/boot/Image.gz-dtb ../ak3/kernel || exit 1
          cd ../ak3
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i 's/is_slot_device=0;/is_slot_device=1;/' anykernel.sh
          
          RUN_NUMBER="${{ github.run_number }}"
          zip -r ../Xiaomi12_Cupid_KSU_SUSFS_${RUN_NUMBER}.zip * -x "*.git*" || exit 1
          echo "✅ Flashable ZIP created"

      - name: 🔐 Generate Checksums
        run: |
          RUN_NUMBER="${{ github.run_number }}"
          sha256sum Xiaomi12_Cupid_KSU_SUSFS_${RUN_NUMBER}.zip > Xiaomi12_Cupid_KSU_SUSFS_${RUN_NUMBER}.sha256
          md5sum Xiaomi12_Cupid_KSU_SUSFS_${RUN_NUMBER}.zip > Xiaomi12_Cupid_KSU_SUSFS_${RUN_NUMBER}.md5
          echo "✅ Checksums generated"

      - name: 📤 Upload Kernel Zip
        uses: actions/upload-artifact@v4
        with:
          name: Xiaomi12-Cupid-Kernel-Build-${{ github.run_number }}
          path: |
            Xiaomi12_Cupid_KSU_SUSFS_*.zip
            Xiaomi12_Cupid_KSU_SUSFS_*.sha256
            Xiaomi12_Cupid_KSU_SUSFS_*.md5
          retention-days: 30

      - name: 📤 Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Log-${{ github.run_number }}
          path: kernel-source/build.log
          retention-days: 30
          if-no-files-found: ignore
